plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace "com.pb.bilibilimod"

    defaultConfig {
        applicationId "com.pb.bilibilimod"
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
